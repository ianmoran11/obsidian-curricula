name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: plugin/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: plugin

      - name: Lint
        run: npm run lint
        working-directory: plugin

      - name: Typecheck
        run: npm run typecheck
        working-directory: plugin

      - name: Test
        run: npm test
        working-directory: plugin
